<!DOCTYPE html>
<html>
<head>
    <title>Team Checker</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-image: url('https://thumbs.dreamstime.com/b/abstract-multi-color-powder-explosion-white-background-abstract-multi-color-powder-explosion-white-background-freeze-motion-123661377.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
        }

        nav {
            background: #ffffffaa;
            padding: 15px;
        }

        nav a {
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
            color: blue;
        }

        .card {
            background: white;
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid yellow;
            box-shadow: 0 5px 15px gray;
        }

        button {
            padding: 10px 20px;
            border: 2px solid yellow;
            background-color: #FFF7CD;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        h2 {
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }


    </style>
</head>
<body>

<nav>
    <a href="index.html">Sign Up</a>
    <a href="teamchecker.html">Team Checker</a>
    <a href="players.html">Players</a>
</nav>
<!-- The box  -->
<div class="card">
    <h2 style="color: #C40C0C;">Intramurals Eligibility Checker</h2>

    <p>Online Registration:</p>
    <input type="radio" name="reg" value="yes"> Yes
    <input type="radio" name="reg" value="no"> No

    <p>Medical Clearance:</p>
    <input type="radio" name="med" value="yes"> Yes
    <input type="radio" name="med" value="no"> No

    <p>Grade Level:</p>
    <select id="grade">
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
    </select>

    <br><br>
    <button onclick="checkEligibility()">Check</button>

    <p id="result"></p>
</div>

<script>
    // checks da eligibility of user with the input vlaues //
function checkEligibility() {
    let registered = document.querySelector('input[name="reg"]:checked');
    let medical = document.querySelector('input[name="med"]:checked');
    let grade = document.getElementById("grade").value;
    let result = document.getElementById("result");
    // checks if user selected the options //
    if (!registered || !medical) {
        result.innerHTML = "Please answer all questions.";
        return;
    }
    // checks if user answered yes to medical and registered value //
    if (registered.value === "yes" && medical.value === "yes" && grade >= 7 && grade <= 10) {
        result.innerHTML = "Eligible for Intramurals!";
    } else {
        result.innerHTML = "Not Eligible.";
    }
}
</script>

</body>
</html>
