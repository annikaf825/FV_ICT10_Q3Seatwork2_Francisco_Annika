<!DOCTYPE html>
<html>
<head>
    <title>Intramurals SY 2025-2026 - Sign Up</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-image: url('https://thumbs.dreamstime.com/b/abstract-multi-color-powder-explosion-white-background-abstract-multi-color-powder-explosion-white-background-freeze-motion-123661377.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
        }

        nav {
            background: #ffffffaa;
            padding: 15px;
        }

        nav a {
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
            color: blue;
        }

        .card {
            background: white;
            width: 300px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid yellow;
            box-shadow: 0 5px 15px gray;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            border-radius: 12px;
            border: 2px solid yellow;
            background-color: #FFF7CD;
            font-weight: bold;
            cursor: pointer;
        }

        input {
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
            width: 90%;
            border: 1px solid gray;
        }

        h2 {
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

      
    </style>
</head>
<body>
<!-- navigation baar -->
<nav>
    <a href="index.html">Sign Up</a>
    <a href="teamchecker.html">Team Checker</a>
    <a href="players.html">Players</a>
</nav>

<!-- Sign up box -->
<div class="card">
    <h2 style="color: #C40C0C;">Create Your Account!!</h2>
    <p>Welcome! Please create your account to join the Intramurals.</p>

    <input type="text" id="username" placeholder="Enter Username..">
    <input type="text" id="password" placeholder="Enter Password..">
    <br>
    <button onclick="signUp()">Sign Up</button>

    <p id="output"></p>
</div>

<script>
function signUp() {
    // gets the values of what the user inputs //
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let output = document.getElementById("output");

    // checks the length of user and pass //
    if (username.length < 7) {
        output.innerHTML = "Username must be at least 7 characters.";
    } 
    else if (password.length < 8) {
        output.innerHTML = "Password must be at least 8 characters.";
    } 
    else {
        output.innerHTML = "Account created! You may now log in.";
    }
}
</script>

</body>
</html>
